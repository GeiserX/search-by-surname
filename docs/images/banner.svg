<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#37474F"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90A4AE"/>
      <stop offset="100%" style="stop-color:#546E7A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="8" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Phone icon -->
  <g transform="translate(100, 100)" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Phone handset -->
    <path d="M-30,18 C-30,18 -28,8 -22,2 C-16,-4 -10,-8 -10,-8 L-6,-4 L-14,4 C-14,4 -6,14 2,22 C10,30 20,38 20,38 L28,30 L32,34 C32,34 28,40 22,46 C16,52 6,54 6,54" stroke-width="2.5"/>
    <!-- Signal waves -->
    <path d="M8,-20 C14,-14 14,-4 8,2" opacity="0.5"/>
    <path d="M14,-26 C24,-16 24,-0 14,10" opacity="0.35"/>
    <path d="M20,-32 C34,-18 34,4 20,18" opacity="0.2"/>
  </g>

  <!-- Magnifying glass icon -->
  <g transform="translate(100, 100)" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round">
    <circle cx="-8" cy="-8" r="18" opacity="0.3"/>
    <line x1="5" y1="5" x2="16" y2="16" opacity="0.3" stroke-width="3"/>
  </g>

  <!-- Title -->
  <text x="200" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#ECEFF1" letter-spacing="-0.5">search-by-surname</text>

  <!-- Subtitle -->
  <text x="200" y="130" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#90A4AE" letter-spacing="0.5">Batch search Spanish telephone directories by surname</text>

  <!-- Bottom accent line -->
  <rect x="200" y="148" width="60" height="2" rx="1" fill="#546E7A"/>
</svg>
