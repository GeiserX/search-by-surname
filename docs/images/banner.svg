<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B2838"/>
      <stop offset="50%" stop-color="#141E2B"/>
      <stop offset="100%" stop-color="#0D1219"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B0BEC5"/>
      <stop offset="100%" stop-color="#607D8B"/>
    </linearGradient>
    <radialGradient id="iconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#607D8B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#607D8B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle directory page lines (representing phone book pages) -->
  <g opacity="0.025" stroke="#B0BEC5" stroke-width="0.8">
    <line x1="40" y1="25" x2="40" y2="175"/>
    <line x1="860" y1="25" x2="860" y2="175"/>
    <line x1="60" y1="40" x2="180" y2="40"/>
    <line x1="60" y1="55" x2="160" y2="55"/>
    <line x1="60" y1="70" x2="175" y2="70"/>
    <line x1="60" y1="85" x2="150" y2="85"/>
    <line x1="60" y1="100" x2="170" y2="100"/>
    <line x1="60" y1="115" x2="155" y2="115"/>
    <line x1="60" y1="130" x2="180" y2="130"/>
    <line x1="60" y1="145" x2="145" y2="145"/>
    <line x1="60" y1="160" x2="165" y2="160"/>
    <line x1="720" y1="40" x2="840" y2="40"/>
    <line x1="720" y1="55" x2="820" y2="55"/>
    <line x1="720" y1="70" x2="835" y2="70"/>
    <line x1="720" y1="85" x2="810" y2="85"/>
    <line x1="720" y1="100" x2="830" y2="100"/>
    <line x1="720" y1="115" x2="815" y2="115"/>
    <line x1="720" y1="130" x2="840" y2="130"/>
    <line x1="720" y1="145" x2="805" y2="145"/>
    <line x1="720" y1="160" x2="825" y2="160"/>
  </g>

  <!-- Icon glow -->
  <circle cx="290" cy="100" r="65" fill="url(#iconGlow)"/>

  <!-- Open book / directory icon -->
  <g transform="translate(290, 94)" fill="none" stroke="url(#accent)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left page -->
    <path d="M-4,-30 L-36,-26 C-39,-25.5 -42,-23 -42,-20 L-42,22 C-42,25 -39,27.5 -36,27 L-4,23 Z" stroke-width="1.8" opacity="0.7" fill="rgba(96,125,139,0.04)"/>
    <!-- Right page -->
    <path d="M4,-30 L36,-26 C39,-25.5 42,-23 42,-20 L42,22 C42,25 39,27.5 36,27 L4,23 Z" stroke-width="1.8" opacity="0.7" fill="rgba(96,125,139,0.04)"/>
    <!-- Spine -->
    <path d="M0,-32 L0,25" stroke-width="1.5" opacity="0.5"/>
    <!-- Text lines on left page -->
    <line x1="-32" y1="-16" x2="-10" y2="-14" stroke-width="1.2" opacity="0.35"/>
    <line x1="-32" y1="-8" x2="-14" y2="-6.5" stroke-width="1.2" opacity="0.25"/>
    <line x1="-32" y1="0" x2="-12" y2="1" stroke-width="1.2" opacity="0.35"/>
    <line x1="-32" y1="8" x2="-16" y2="9" stroke-width="1.2" opacity="0.25"/>
    <line x1="-32" y1="16" x2="-10" y2="17" stroke-width="1.2" opacity="0.35"/>
    <!-- Magnifying glass over right page -->
    <circle cx="22" cy="2" r="14" stroke-width="1.8" opacity="0.55"/>
    <line x1="32" y1="12" x2="40" y2="20" stroke-width="2.5" opacity="0.55"/>
    <!-- Highlighted line under magnifier -->
    <line x1="14" y1="0" x2="30" y2="0" stroke-width="2" opacity="0.6" stroke="#B0BEC5"/>
  </g>

  <!-- Title -->
  <text x="570" y="82" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#ECEFF1" text-anchor="middle" letter-spacing="-0.5">
    search-by-surname
  </text>

  <!-- Tagline -->
  <text x="570" y="115" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14.5" fill="#78909C" text-anchor="middle" letter-spacing="0.5">
    Batch search Spanish telephone directories by surname
  </text>

  <!-- Tech tags -->
  <g transform="translate(570, 148)" text-anchor="middle">
    <!-- R badge -->
    <rect x="-95" y="-11" width="28" height="18" rx="3" fill="rgba(39,109,195,0.15)" stroke="#276DC3" stroke-width="0.8" opacity="0.6"/>
    <text x="-81" y="3" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#276DC3" text-anchor="middle" font-weight="600" opacity="0.7">R</text>
    <!-- OSINT badge -->
    <rect x="-55" y="-11" width="48" height="18" rx="3" fill="rgba(96,125,139,0.1)" stroke="#607D8B" stroke-width="0.8" opacity="0.5"/>
    <text x="-31" y="3" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#90A4AE" text-anchor="middle" letter-spacing="1" opacity="0.6">OSINT</text>
    <!-- Spain badge -->
    <rect x="3" y="-11" width="46" height="18" rx="3" fill="rgba(96,125,139,0.1)" stroke="#607D8B" stroke-width="0.8" opacity="0.5"/>
    <text x="26" y="3" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#90A4AE" text-anchor="middle" letter-spacing="1" opacity="0.6">SPAIN</text>
    <!-- Archived badge -->
    <rect x="59" y="-11" width="62" height="18" rx="3" fill="rgba(230,126,34,0.1)" stroke="#E67E22" stroke-width="0.8" opacity="0.45"/>
    <text x="90" y="3" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#E67E22" text-anchor="middle" letter-spacing="0.5" opacity="0.55">ARCHIVED</text>
  </g>
</svg>
